services:

  api:
    image: fakenews-api
    container_name: fakenews-api
    ports:
      - "5000:5000"
    volumes:
      - ./models:/app/models
    environment:
      - MODEL_PATH=models/model.pkl
      - PORT=5000
      - MLFLOW_TRACKING_URI=http://mlflow:5001
    depends_on:
      - mlflow
    networks:
      - mlops-network
    restart: unless-stopped

  mlflow:
    image: python:3.10-slim
    container_name: fakenews-mlflow
    working_dir: /mlflow
    command: >
      bash -c "pip install mlflow==2.10.0 -q &&
               mlflow server
               --backend-store-uri sqlite:///mlflow.db
               --default-artifact-root ./mlruns
               --host 0.0.0.0
               --port 5001"
    ports:
      - "5001:5001"
    volumes:
      - ./mlflow.db:/mlflow/mlflow.db
      - ./mlruns:/mlflow/mlruns
    networks:
      - mlops-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: fakenews-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - mlops-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: fakenews-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning
    networks:
      - mlops-network
    restart: unless-stopped

networks:
  mlops-network:
    driver: bridge

volumes:
  grafana-storage: